<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Stories — TheAdultWorld</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="Logo.png">

  <!-- FONT AWESOME -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" crossorigin="anonymous"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap');
    body { font-family: "Lexend", sans-serif; }
  </style>
</head>

<body class="bg-black text-white w-full">

<div class="max-w-full mx-auto p-4 shadow-2xl bg-black border border-neutral-900">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-4xl font-extrabold">Manage Stories</h1>

    <div class="flex gap-3">

      <!-- HOME BUTTON -->
      <a href="/" class="w-11 h-11 flex items-center justify-center rounded-full bg-blue-600 hover:bg-blue-700 transition">
        <i class="fa-solid fa-house text-lg"></i>
      </a>

      <!-- WRITE STORY -->
      <a href="/write" class="w-11 h-11 flex items-center justify-center rounded-full bg-green-600 hover:bg-green-700 transition">
        <i class="fa-solid fa-pen-nib"></i>
      </a>

    </div>
  </div>

  <!-- GRID -->
  <div id="storiesGrid"
    class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">

    <p id="loading-message" class="col-span-full text-center text-gray-400">
      Loading stories...
    </p>

  </div>

  <!-- PAGINATION -->
  <div id="pagination" class="hidden mt-6 flex justify-center gap-4">

    <!-- PREV -->
    <button id="prev-page"
      class="w-11 h-11 flex items-center justify-center rounded-full bg-neutral-800 hover:bg-neutral-700">
      <i class="fa-solid fa-arrow-left"></i>
    </button>

    <span id="page-info" class="text-gray-300"></span>

    <!-- NEXT -->
    <button id="next-page"
      class="w-11 h-11 flex items-center justify-center rounded-full bg-neutral-800 hover:bg-neutral-700">
      <i class="fa-solid fa-arrow-right"></i>
    </button>

  </div>

</div>

<script>
  let allStories = [];
  let currentPage = 1;
  let perPage = 20; // default (desktop)
  
  const grid = document.getElementById("storiesGrid");
  const loadingMsg = document.getElementById("loading-message");
  const pagination = document.getElementById("pagination");
  const prevBtn = document.getElementById("prev-page");
  const nextBtn = document.getElementById("next-page");
  const pageInfo = document.getElementById("page-info");

  // RESPONSIVE PER-PAGE LOGIC
  function updatePerPage() {
    if (window.innerWidth < 640) perPage = 20;        // mobile
    else if (window.innerWidth < 1024) perPage = 21;  // tab small
    else if (window.innerWidth < 1280) perPage = 20;  // tab large
    else perPage = 20;                                // desktop
  }

  window.addEventListener("resize", () => {
    updatePerPage();
    render();
  });

  function escape(str) {
    return str.replace(/[&<>"']/g, m => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[m]));
  }

  async function fetchStories() {
    updatePerPage();

    try {
      const res = await fetch("/api/stories");
      allStories = await res.json();
      render();
    } catch {
      loadingMsg.textContent = "Failed to load stories.";
    }
  }

  function render() {
    grid.innerHTML = "";
    loadingMsg.classList.add("hidden");

    const start = (currentPage - 1) * perPage;
    const items = allStories.slice(start, start + perPage);

    if (items.length === 0) {
      grid.innerHTML = `<p class="col-span-full text-center text-gray-500">No stories found.</p>`;
      return;
    }

    items.forEach(s => {
      const div = document.createElement("div");

      div.className =
        "group relative overflow-hidden border border-white/5 transition transform hover:scale-105 " +
        "h-[350px] lg:h-[420px] bg-cover bg-center";

      div.style.backgroundImage = `url('${s.cover_image || "default.jpg"}')`;

      div.innerHTML = `
        <div class="absolute bottom-0 w-full bg-black/60 p-3 flex flex-col gap-2">
          <h3 class="font-bold text-sm truncate">${escape(s.title)}</h3>

          <div class="flex justify-between gap-4 opacity-0 translate-y-2 transition-all duration-200 group-hover:opacity-100 group-hover:translate-y-0">

            <!-- EDIT ICON BUTTON -->
            <a href="/edit-story?id=${s.id}"
              class="w-10 h-10 flex items-center justify-center rounded-full bg-green-600 hover:bg-green-700">
              <i class="fa-solid fa-pen"></i>
            </a>

            <!-- DELETE ICON BUTTON -->
            <button onclick="deleteStory('${s.id}')"
              class="w-10 h-10 flex items-center justify-center rounded-full bg-red-600 hover:bg-red-700">
              <i class="fa-solid fa-trash"></i>
            </button>

          </div>
        </div>
      `;

      grid.appendChild(div);
    });

    updatePagination();
  }

  function updatePagination() {
    const total = Math.ceil(allStories.length / perPage);

    pagination.classList.toggle("hidden", total <= 1);

    pageInfo.textContent = `Page ${currentPage} of ${total}`;

    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage === total;
  }

  prevBtn.onclick = () => {
    if (currentPage > 1) {
      currentPage--;
      render();
    }
  };

  nextBtn.onclick = () => {
    const total = Math.ceil(allStories.length / perPage);
    if (currentPage < total) {
      currentPage++;
      render();
    }
  };

  async function deleteStory(id) {
    if (!confirm("Delete this story?")) return;

    await fetch(`/api/stories/${id}`, { method: "DELETE" });

    allStories = allStories.filter(s => s.id !== id);
    render();
  }

  fetchStories();
</script>

</body>
</html>
