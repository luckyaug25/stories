<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheAdultWorld — Latest Stories</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="Logo.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" crossorigin="anonymous"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap');

    body {
      font-family: "Lexend", sans-serif;
      background-color: #0a0a0a;
      margin: 0;
      overflow: hidden;
    }

    /* Loader */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity .8s ease;
    }
    #loader img {
      width: 130px;
      height: 130px;
      filter: drop-shadow(0 0 12px #fff);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: .7; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    .loading-bar-container {
      width: 200px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      margin-top: 20px;
      overflow: hidden;
    }
    .loading-bar {
      width: 0%;
      height: 100%;
      background: white;
      border-radius: 10px;
      animation: loadBar 3.5s ease forwards;
    }

    #main-content { opacity: 0; transition: opacity 1s ease; }
    #main-content.visible { opacity: 1; }

    /* Story Cards */
    .story-card {
      position: relative;
      height: 350px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border: 1px solid rgba(255,255,255,0.1);
      transition: .3s;
      overflow: hidden;
    }

    .story-card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(255,255,255,.15);
    }

    @media (min-width: 1024px) {
      .story-card { height: 420px; }
    }
  </style>
</head>

<body class="text-white">

  <!-- LOADER -->
  <div id="loader">
    <img src="Logo.png" alt="">
    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main-content" class="w-full bg-black p-4 border border-gray-800 shadow-xl">

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-center mb-10">
      <h1 class="text-4xl sm:text-5xl font-extrabold">Latest Stories</h1>

      <div class="flex space-x-4 mt-6 sm:mt-0">

        <!-- WRITE BUTTON -->
        <a href="/write">
          <button class="px-5 py-3 bg-blue-600 hover:bg-blue-700 border border-blue-500 rounded shadow-lg">
            <i class="fa-solid fa-pen-nib text-xl"></i>
          </button>
        </a>

        <!-- MANAGE BUTTON -->
        <a href="/manage">
          <button class="px-5 py-3 bg-green-600 hover:bg-green-700 border border-green-500 rounded shadow-lg">
            <i class="fa-solid fa-gear text-xl"></i>
          </button>
        </a>

      </div>
    </div>

    <!-- STORY GRID -->
    <div id="story-list" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-2">
      <p id="loading-message" class="col-span-full text-center text-gray-400">Loading stories...</p>
    </div>

    <!-- PAGINATION -->
    <div id="pagination" class="flex justify-center items-center space-x-4 mt-10 hidden">

      <!-- PREV -->
      <button id="btn-prev" class="px-5 py-2 bg-gray-900 hover:bg-gray-800 border border-gray-700 rounded">
        <i class="fa-solid fa-angle-left text-lg"></i>
      </button>

      <span id="page-info" class="text-gray-300"></span>

      <!-- NEXT -->
      <button id="btn-next" class="px-5 py-2 bg-gray-900 hover:bg-gray-800 border border-gray-700 rounded">
        <i class="fa-solid fa-angle-right text-lg"></i>
      </button>

    </div>
  </div>

<script>
  const storyList = document.getElementById("story-list");
  const loadingMsg = document.getElementById("loading-message");
  const pagination = document.getElementById("pagination");

  const prevBtn = document.getElementById("btn-prev");
  const nextBtn = document.getElementById("btn-next");
  const pageInfo = document.getElementById("page-info");

  let allStories = [];
  let currentPage = 1;
  let perPage = 20;

  /** SET CARDS PER PAGE BASED ON DEVICE */
  function updatePerPage() {
    const w = window.innerWidth;

    if (w < 640) perPage = 20;      // mobile (2 per row)
    else if (w < 1024) perPage = 21; // tablet small (3 per row)
    else if (w < 1280) perPage = 20; // tablet big (4 per row)
    else perPage = 20;              // desktop (5 per row)
  }

  window.addEventListener("resize", () => {
    updatePerPage();
    render();
  });

  async function fetchStories() {
    loadingMsg.classList.remove("hidden");

    try {
      const res = await fetch("/api/stories");
      allStories = await res.json();

      updatePerPage();
      render();
    } catch {
      storyList.innerHTML = `<p class='col-span-full text-red-500'>Failed to load stories.</p>`;
    }
  }

  function render() {
    storyList.innerHTML = "";
    loadingMsg.classList.add("hidden");

    const start = (currentPage - 1) * perPage;
    const items = allStories.slice(start, start + perPage);

    if (items.length === 0) {
      storyList.innerHTML = `<p class='col-span-full text-gray-500'>Loading..</p>`;
      return;
    }

    items.forEach(s => {
      const card = document.createElement("div");
      card.className = "story-card";
      card.style.backgroundImage = `url('${s.cover_image || "default.jpg"}')`;

      card.innerHTML = `
        <div class="absolute bottom-0 w-full bg-black/60 p-3">
          <h3 class="font-semibold text-sm truncate">${s.title}</h3>
        </div>
      `;

      card.onclick = () => window.location.href = `/read?id=${s.id}`;
      storyList.appendChild(card);
    });

    updatePaginationUI();
  }

  function updatePaginationUI() {
    const totalPages = Math.ceil(allStories.length / perPage);

    pagination.classList.toggle("hidden", totalPages <= 1);
    pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;

    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
  }

  prevBtn.onclick = () => {
    currentPage--;
    render();
  };

  nextBtn.onclick = () => {
    currentPage++;
    render();
  };

  window.addEventListener("load", () => {
    const loader = document.getElementById("loader");
    const main = document.getElementById("main-content");

    loader.style.opacity = "0";
    setTimeout(() => {
      loader.style.display = "none";
      main.classList.add("visible");
      document.body.style.overflow = "auto";
      fetchStories();
    }, 1000);
  });
</script>

</body>
</html>
