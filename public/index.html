<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheAdultWorld — Latest Stories</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="Logo.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" crossorigin="anonymous"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap');

    body {
      font-family: "Lexend", sans-serif;
      background-color: #0a0a0a;
      margin: 0;
      /* Changed from overflow: hidden to allow content after loading */
      overflow-x: hidden; 
    }

    /* 🔥 NEW Running Border Loader */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .loader-box {
      width: 180px;
      height: 180px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Added border-radius for modern look */
      overflow: hidden; /* Crucial: Hides the rotating pseudo-element outside the box */
    }

    .loader-box img {
      width: 95%;
      height: 95%;
      z-index: 2;
      /* Added border-radius to match the box */
    }

    /* Animated Border Line Container */
    .border-runner {
      position: absolute;
      inset: -5px; /* Increase inset to ensure the animated border is visible outside the overflow:hidden area */
      /* No change, but the animation is applied to the pseudo-element */
    }

    /* The actual emerging line is a spinning border on a larger pseudo-element */
    .border-runner::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      /* Creates a conical gradient for the emerging line effect */
      background: conic-gradient(transparent 0%, rgb(208, 73, 0) 100%, rgb(208, 73, 0) 100%);
      animation: borderRunEmerging 1.5s linear infinite;
    }

    /* KEYFRAMES for the Emerging Line Effect */
    @keyframes borderRunEmerging {
        /* Rotate the large background to make the white part (the "line") appear to run around the edge */
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* MAIN CONTENT APPEAR */
    #main-content { opacity: 0; transition: opacity 0.8s ease; }
    #main-content.visible { opacity: 1; }

    /* Story Cards - Keep original styles */
    .story-card {
      position: relative;
      height: 350px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border: 1px solid rgba(255,255,255,0.1);
      transition: .3s;
      overflow: hidden;
      cursor: pointer;
    }

    .story-card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(255,255,255,.15);
    }

    @media (min-width: 1024px) {
      .story-card { height: 420px; }
    }
  </style>
</head>

<body class="text-white">

  <!-- 🔥 NEW MINIMAL RUNNING BORDER LOADER -->
  <div id="loader">
    <div class="loader-box">
      <img src="Logo.png" alt="">
      <div class="border-runner"></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main-content" class="w-full bg-black p-4 border border-gray-800 shadow-xl">

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-center mb-10">
      <h1 class="text-4xl sm:text-5xl font-extrabold">Latest Stories</h1>

      <div class="flex space-x-4 mt-6 sm:mt-0">
        <a href="/write">
          <button class="px-5 py-3 bg-blue-600 hover:bg-blue-700 border border-blue-500 rounded shadow-lg">
            <i class="fa-solid fa-pen-nib text-xl"></i>
          </button>
        </a>

        <a href="/manage">
          <button class="px-5 py-3 bg-green-600 hover:bg-green-700 border border-green-500 rounded shadow-lg">
            <i class="fa-solid fa-gear text-xl"></i>
          </button>
        </a>
      </div>
    </div>

    <!-- STORY GRID -->
    <div id="story-list" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-2">
      <p id="loading-message" class="col-span-full text-center text-gray-400">Loading stories...</p>
    </div>

    <!-- PAGINATION -->
    <div id="pagination" class="flex justify-center items-center space-x-4 mt-10 hidden">
      <button id="btn-prev" class="px-5 py-2 bg-gray-900 hover:bg-gray-800 border border-gray-700 rounded">
        <i class="fa-solid fa-angle-left text-lg"></i>
      </button>

      <span id="page-info" class="text-gray-300"></span>

      <button id="btn-next" class="px-5 py-2 bg-gray-900 hover:bg-gray-800 border border-gray-700 rounded">
        <i class="fa-solid fa-angle-right text-lg"></i>
      </button>
    </div>

  </div>

<script>
  const storyList = document.getElementById("story-list");
  const loadingMsg = document.getElementById("loading-message");
  const pagination = document.getElementById("pagination");

  const prevBtn = document.getElementById("btn-prev");
  const nextBtn = document.getElementById("btn-next");
  const pageInfo = document.getElementById("page-info");

  let allStories = [];
  let currentPage = 1;
  let perPage = 20;

  function updatePerPage() {
    const w = window.innerWidth;

    if (w < 640) perPage = 20;
    else if (w < 1024) perPage = 21;
    else if (w < 1280) perPage = 20;
    else perPage = 20;
  }

  window.addEventListener("resize", () => {
    updatePerPage();
    render();
  });

  async function fetchStories() {
    loadingMsg.classList.remove("hidden");

    try {
      const res = await fetch("/api/stories");
      allStories = await res.json();

      updatePerPage();
      render();
    } catch {
      storyList.innerHTML = `<p class='col-span-full text-red-500'>Failed to load stories.</p>`;
    }
  }

  function render() {
    storyList.innerHTML = "";
    loadingMsg.classList.add("hidden");

    const start = (currentPage - 1) * perPage;
    const items = allStories.slice(start, start + perPage);

    if (items.length === 0) {
      storyList.innerHTML = `<p class='col-span-full text-gray-500'>Loading..</p>`;
      return;
    }

    items.forEach(s => {
      const card = document.createElement("div");
      card.className = "story-card";
      card.style.backgroundImage = `url('${s.cover_image || "default.jpg"}')`;

      card.innerHTML = `
        <div class="absolute bottom-0 w-full bg-black/60 p-3">
          <h3 class="font-semibold text-sm truncate">${s.title}</h3>
        </div>
      `;

      card.onclick = () => window.location.href = `/read?id=${s.id}`;
      storyList.appendChild(card);
    });

    updatePaginationUI();
  }

  function updatePaginationUI() {
    const totalPages = Math.ceil(allStories.length / perPage);

    pagination.classList.toggle("hidden", totalPages <= 1);
    pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;

    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
  }

  prevBtn.onclick = () => { currentPage--; render(); };
  nextBtn.onclick = () => { currentPage++; render(); };

  window.addEventListener("load", () => {
    const loader = document.getElementById("loader");
    const main = document.getElementById("main-content");

    setTimeout(() => {
      loader.remove();
      document.body.style.overflow = "auto";
      main.classList.add("visible");
      fetchStories();
    }, 1000);
  });
</script>

</body>
</html>
