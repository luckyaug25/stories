<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="Logo.png">
  <title>Write Story</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="index.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a;
      color: white;
    }
    button, a {
      border-radius: 0 !important;
      transition: none !important;
    }
    .btn-blue { background-color: #007bff; border: 2px solid #007bff; color: white; }
    .btn-green { background-color: #00a65a; border: 2px solid #00a65a; color: white; }
    .btn-red { background-color: #d9534f; border: 2px solid #d9534f; color: white; }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8">

  <div class="max-w-3xl w-full bg-black p-6 border-2 border-gray-800 shadow-2xl">
    <h1 class="text-4xl sm:text-5xl font-extrabold text-white mb-8 text-center leading-tight">
      Write a New Story
    </h1>

    <div class="flex flex-col sm:flex-row justify-center items-center space-y-4 sm:space-y-0 sm:space-x-6 mb-10">
      <a href="/">
        <button class="btn-blue py-3 px-8 font-bold w-full sm:w-auto">Home</button>
      </a>
      <a href="/manage">
        <button class="btn-blue py-3 px-8 font-bold w-full sm:w-auto">Manage Stories</button>
      </a>
    </div>

    <!-- FORM -->
    <form id="storyForm" class="flex flex-col gap-4">

      <input type="text" id="title" placeholder="Title" required class="p-3 bg-black text-white border-2 border-gray-700">

      <!-- COVER IMAGE INPUT -->
      <input type="text" id="coverImage" placeholder="Cover Image URL" class="p-3 bg-black text-white border-2 border-gray-700">

      <textarea id="content" placeholder="Write your story here..." rows="10" required class="p-3 bg-black text-white border-2 border-gray-700 resize-y"></textarea>

      <div class="buttons flex flex-col sm:flex-row justify-center items-center space-y-4 sm:space-y-0 sm:space-x-4 mt-4">
        <button type="button" onclick="openPopup()" class="btn-green w-full sm:w-auto py-3 px-8 font-bold">➕ Insert Media</button>
        <button type="submit" class="btn-blue w-full sm:w-auto py-3 px-8 font-bold">Post Story</button>
      </div>
    </form>
  </div>

  <!-- Media Popup -->
  <div id="mediaModal" class="fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center p-4 z-50 hidden overflow-y-auto">
    <div class="bg-black p-6 w-full max-w-xl border-2 border-gray-700">
      <h3 class="text-2xl font-semibold text-white mb-4">Insert Media</h3>
      <input type="text" id="mediaURL" placeholder="Paste media link" class="w-full p-3 mb-4 bg-black text-white border-2 border-gray-700">
      <div id="mediaPreview" class="mb-4 p-2 border-2 border-gray-700"></div>

      <div class="flex justify-end space-x-3">
        <button onclick="insertMediaFromPopup()" class="btn-blue py-2 px-6 font-bold">Insert</button>
        <button onclick="closePopup()" class="btn-red py-2 px-6 font-bold">Cancel</button>
      </div>
    </div>
  </div>

  <div id="custom-message-box" class="fixed top-4 right-4 p-4 text-white text-lg font-semibold shadow-lg hidden"></div>

  <script>
  function showCustomMessage(message, type = "info") {
    const box = document.getElementById("custom-message-box");
    box.textContent = message;
    box.className = "fixed top-4 right-4 p-4 text-white text-lg font-semibold";
    if (type === "error") box.classList.add("btn-red");
    if (type === "success") box.classList.add("btn-green");
    if (type === "info") box.classList.add("btn-blue");
    box.classList.remove("hidden");
    setTimeout(() => box.classList.add("hidden"), 3000);
  }

  document.getElementById("storyForm").addEventListener("submit", async e => {
    e.preventDefault();

    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const coverImage = document.getElementById("coverImage").value.trim() || null;

    if (!title || !content) {
      showCustomMessage("Title & content required.", "error");
      return;
    }

    const res = await fetch("/api/stories", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, content, cover_image: coverImage })
    });

    if (res.ok) {
      showCustomMessage("Story posted!", "success");
      setTimeout(() => window.location.href = "/", 1000);
    } else {
      showCustomMessage("Failed to post story.", "error");
    }
  });

  function openPopup() {
    const modal = document.getElementById("mediaModal");
    modal.style.display = "flex";

    // Reset fields when opened
    document.getElementById("mediaURL").value = "";
    document.getElementById("mediaPreview").innerHTML = "";
  }

  function closePopup() {
    document.getElementById("mediaModal").style.display = "none";
  }

  document.getElementById("mediaURL").addEventListener("input", function () {
    const url = this.value.trim();
    const preview = document.getElementById("mediaPreview");
    let p = "";

    if (!url) {
      preview.innerHTML = "";
      return;
    }

    if (url.includes("youtube.com/watch?v=")) {
      const id = url.split("v=")[1].split("&")[0];
      p = `<iframe width="100%" height="250" src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
    } 
    else if (url.match(/\.(mp4|webm|ogg)$/i)) {
      p = `<video controls src="${url}" class="w-full"></video>`;
    } 
    else {
      p = `<img src="${url}" class="w-full">`;
    }

    preview.innerHTML = p;
  });

  // Insert at cursor position
  function insertAtCursor(textarea, text) {
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const before = textarea.value.substring(0, start);
    const after = textarea.value.substring(end);
    textarea.value = before + text + after;

    // Move cursor after inserted content
    textarea.selectionStart = textarea.selectionEnd = start + text.length;
  }

  function insertMediaFromPopup() {
    const url = document.getElementById("mediaURL").value.trim();
    const preview = document.getElementById("mediaPreview");
    if (!url) return;

    let tag = "";

    if (url.includes("youtube.com")) {
      const id = url.split("v=")[1].split("&")[0];
      tag = `<iframe width="100%" height="315" src="https://www.youtube.com/embed/${id}"></iframe>`;
    } 
    else if (url.match(/\.(mp4|webm|ogg)$/i)) {
      tag = `<video controls src="${url}" style="width:100%"></video>`;
    } 
    else {
      tag = `<img src="${url}" style="width:100%">`;
    }

    const textarea = document.getElementById("content");
    insertAtCursor(textarea, "\n" + tag + "\n");

    // Reset modal for next use
    document.getElementById("mediaURL").value = "";
    preview.innerHTML = "";

    closePopup();
  }
</script>

</body>
</html>
